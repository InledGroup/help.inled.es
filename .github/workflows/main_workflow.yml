name: Unified Article Management & Deploy

on:
  push:
    branches: [ main ]
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, closed, reopened]
  workflow_dispatch:

jobs:
  manage-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para hacer push correctamente / Needed to push correctly

      # PASO 1: Gestión de Borrados (Solo si es una issue de borrado)
      # STEP 1: Deletion Management (Only if it's a delete issue)
      - name: Process Deletion if needed
        if: github.event_name == 'issues' && (contains(github.event.issue.title, '[DELETE]') || contains(github.event.issue.labels.*.name, 'delete-request'))
        id: deletion
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const body = context.payload.issue.body || "";
            const title = context.payload.issue.title || "";
            
            // Extraer slug de la URL o el título
            let slug = "";
            const urlMatch = body.match(/help\/([^/\s]+)/);
            if (urlMatch) {
              slug = urlMatch[1].trim();
            } else {
              const titleMatch = title.match(/\[DELETE\]\s*(\S+)/);
              if (titleMatch) slug = titleMatch[1].trim();
            }

            console.log(`Slug detectado para borrar: "${slug}"`);
            
            if (!slug) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "❌ No se encontró un slug válido para borrar."
              });
              return;
            }

            let deleted = false;

            // 1. Cerrar Issue original si existe
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'documentation',
              state: 'open'
            });

            const slugRegex = new RegExp(`slug:\\s*${slug}(\\s|$)`, 'i');
            for (const issue of issues.data) {
              if (issue.body && slugRegex.test(issue.body)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
                console.log(`Issue #${issue.number} cerrada.`);
                deleted = true;
              }
            }

            // 2. Borrar archivo local si existe
            const helpDir = 'src/content/help';
            if (fs.existsSync(helpDir)) {
              const files = fs.readdirSync(helpDir);
              for (const file of files) {
                if (!file.endsWith('.md')) continue;
                const filePath = path.join(helpDir, file);
                const content = fs.readFileSync(filePath, 'utf8');
                if (slugRegex.test(content)) {
                  fs.unlinkSync(filePath);
                  console.log(`Archivo local ${file} borrado.`);
                  
                  const { execSync } = require('child_process');
                  execSync(`git config user.name "github-actions[bot]"`);
                  execSync(`git config user.email "github-actions[bot]@users.noreply.github.com"`);
                  execSync(`git add .`);
                  execSync(`git commit -m "Delete local article: ${slug}"`);
                  execSync(`git push origin main`);
                  deleted = true;
                }
              }
            }

            if (deleted) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ Borrado completado para: **${slug}**. Procediendo al despliegue...`
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ No se encontró el slug **${slug}**.`
              });
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      # PASO 1.5: Feedback para nuevos artículos (No se cierran para que sigan "Live")
      # STEP 1.5: Feedback for new articles (They stay open to remain "Live")
      - name: Comment on Documentation Issue
        if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'documentation') && github.event.action != 'deleted' && !contains(github.event.issue.title, '[DELETE]')
        uses: actions/github-script@v7
        with:
          script: |
            // Solo comentamos si no se ha comentado ya en este run o si es nueva/editada
            // We only comment to provide feedback that the deployment is starting
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🚀 ¡Recibido! He detectado cambios en este artículo. Estoy reconstruyendo la web para que los cambios aparezcan en **help.inled.es** en un par de minutos."
            });

      # PASO 2: Despliegue (Siempre se ejecuta después del paso 1)
      # STEP 2: Deployment (Always runs after step 1)
      - name: Install dependencies
        run: npm install

      - name: Build Astro
        run: npm run build
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: help-inled-es
          directory: dist
