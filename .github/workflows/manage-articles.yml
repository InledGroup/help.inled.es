name: Manage Articles (Delete)

on:
  issues:
    types: [opened]

jobs:
  process-deletion:
    if: contains(github.event.issue.title, '[DELETE]') || contains(github.event.issue.labels.*.name, 'delete-request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract URL or Slug
        id: extract
        run: |
          BODY="${{ github.event.issue.body }}"
          SLUG=$(echo "$BODY" | grep -oP 'help/([^/\s]+)' | cut -d'/' -f2 || echo "")
          if [ -z "$SLUG" ]; then
            SLUG=$(echo "${{ github.event.issue.title }}" | grep -oP '\[DELETE\]\s*(\S+)' | awk '{print $2}' || echo "")
          fi
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Find and Delete (Issue or File)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const slug = "${{ steps.extract.outputs.slug }}".trim();
            console.log(`Buscando para eliminar: "${slug}"`);
            
            if (!slug) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "❌ No he podido extraer un slug válido."
              });
              return;
            }

            // 1. Intentar buscar en Issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'documentation',
              state: 'open'
            });

            const slugRegex = new RegExp(`slug:\\s*${slug}(\\s|$)`, 'i');
            for (const issue of issues.data) {
              if (issue.body && slugRegex.test(issue.body)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `✅ Artículo con slug **${slug}** (Issue #${issue.number}) eliminado.`
                });
                return;
              }
            }

            // 2. Intentar buscar en archivos locales
            const helpDir = 'src/content/help';
            if (fs.existsSync(helpDir)) {
              const files = fs.readdirSync(helpDir);
              for (const file of files) {
                if (!file.endsWith('.md')) continue;
                const filePath = path.join(helpDir, file);
                const content = fs.readFileSync(filePath, 'utf8');
                if (slugRegex.test(content)) {
                  console.log(`Encontrado en archivo local: ${filePath}`);
                  fs.unlinkSync(filePath);
                  
                  // Necesitamos hacer commit del borrado
                  const { execSync } = require('child_process');
                  execSync(`git config user.name "github-actions[bot]"`);
                  execSync(`git config user.email "github-actions[bot]@users.noreply.github.com"`);
                  execSync(`git add .`);
                  execSync(`git commit -m "Delete local article: ${slug}"`);
                  execSync(`git push`);

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: `✅ Archivo local **${file}** con slug **${slug}** eliminado físicamente del repositorio.`
                  });
                  return;
                }
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ No se encontró rastro de **${slug}** ni en Issues ni en archivos locales.`
            });
