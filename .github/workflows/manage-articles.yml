name: Manage Articles (Delete)

on:
  issues:
    types: [opened]

jobs:
  process-deletion:
    if: contains(github.event.issue.title, '[DELETE]') || contains(github.event.issue.labels.*.name, 'delete-request')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Extract URL or Slug
        id: extract
        run: |
          # Extraer el slug de la URL proporcionada en el cuerpo o título
          # Extract the slug from the URL provided in the body or title
          BODY="${{ github.event.issue.body }}"
          SLUG=$(echo "$BODY" | grep -oP 'help/([^/\s]+)' | cut -d'/' -f2 || echo "")
          if [ -z "$SLUG" ]; then
            SLUG=$(echo "${{ github.event.issue.title }}" | grep -oP '\[DELETE\]\s*(\S+)' | awk '{print $2}' || echo "")
          fi
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Find and Close Original Issue
        uses: actions/github-script@v7
        with:
          script: |
            const slug = "${{ steps.extract.outputs.slug }}".trim();
            console.log(`Buscando artículo con slug: "${slug}"`);
            
            if (!slug) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "❌ No he podido extraer un slug válido de la URL o el título. Asegúrate de que tenga el formato: https://help.inled.es/help/tu-slug"
              });
              return;
            }

            // Buscar issues abiertas con la etiqueta documentation
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'documentation',
              state: 'open',
              per_page: 100
            });

            let found = false;
            const slugRegex = new RegExp(`slug:\\s*${slug}(\\s|$)`, 'i');

            for (const issue of issues.data) {
              if (issue.body && slugRegex.test(issue.body)) {
                console.log(`Match encontrado en Issue #${issue.number}`);
                // Encontrada! La cerramos
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `✅ Artículo con slug **${slug}** (Issue #${issue.number}) eliminado correctamente. La web se actualizará en breve.`
                });
                found = true;
                break;
              }
            }

            if (!found) {
              console.log("No se encontró ninguna issue que coincida.");
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ No se encontró ningún artículo activo en GitHub con el slug **${slug}**.\n\n*Nota: Si el artículo es un archivo local en el repositorio, no se puede borrar mediante este workflow de Issues.*`
              });
            }

            // Cerrar la issue de petición de borrado
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
